name: Frontend Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - "*.html"
      - "posts/**/*.html"
      - "styles.css"
      - "visitor-counter.js"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_STORAGE_ACCOUNT: martycraneresume26
  CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}

jobs:
  deploy:
    name: Deploy static website
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate static site files
        run: |
          test -f index.html
          test -f blog.html
          test -f posts/2026-04-20-cloud-resume-challenge.html
          test -f posts/2026-04-20-supply-chain-baseline.html
          test -f styles.css
          test -f visitor-counter.js

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload static site files
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            az storage blob upload-batch \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --destination '$web' \
              --source . \
              --overwrite true \
              --auth-mode login \
              --pattern "*.html" \
              --content-cache-control "no-cache"

            for pattern in "*.css" "*.js"; do
              az storage blob upload-batch \
                --account-name "$AZURE_STORAGE_ACCOUNT" \
                --destination '$web' \
                --source . \
                --overwrite true \
                --auth-mode login \
                --pattern "$pattern" \
                --content-cache-control "public, max-age=300"
            done

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "CLOUDFLARE_ZONE_ID variable is not set. Skipping Cloudflare cache purge."
            exit 0
          fi

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN secret is required when CLOUDFLARE_ZONE_ID is set."
            exit 1
          fi

          payload="$(jq -n '{purge_everything: true}')"

          response="$(curl --fail --silent --show-error --request POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload")"

          echo "$response" | jq -e '.success == true' > /dev/null
